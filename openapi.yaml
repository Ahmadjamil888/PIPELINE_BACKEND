openapi: 3.1.0
info:
  title: Pipeline AI DevOps Platform API
  version: 1.0.0
  description: |
    AI DevOps automation platform for deploying applications to Vercel and Render.
    Provides sandboxed workspace execution via Daytona, AI-powered repository analysis,
    and automated deployment orchestration.
  contact:
    name: Pipeline Support
    email: ahmadjamildhami@gmail.com

servers:
  - url: https://pipeline-ai-labs-by-ahmad.up.railway.app/api/v1
    description: Production server

security:
  - BearerAuth: []

paths:

  # ==================== GITHUB ====================
  /github/connect:
    get:
      summary: Initiate GitHub OAuth
      description: Returns the GitHub OAuth URL to redirect the user to.
      tags: [GitHub]
      operationId: connectGitHub
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GitHub OAuth URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_url:
                    type: string
                    format: uri

  /github/status:
    get:
      summary: Check GitHub connection status
      tags: [GitHub]
      operationId: checkGitHubStatus
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GitHub connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /github/repos:
    get:
      summary: List user GitHub repositories
      description: Returns repositories accessible via the stored GitHub token.
      tags: [GitHub]
      operationId: listGitHubRepos
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: object
                properties:
                  repos:
                    type: array
                    items:
                      $ref: '#/components/schemas/GitHubRepository'
        '401':
          description: GitHub not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /github/repos/connect:
    post:
      summary: Connect a repository and start AI pipeline
      description: Creates a project in the database and starts the AI deployment pipeline.
      tags: [GitHub]
      operationId: connectGitHubRepo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, repo]
              properties:
                user_id:
                  type: string
                repo:
                  $ref: '#/components/schemas/GitHubRepository'
      responses:
        '200':
          description: Project created and pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== PROJECTS ====================
  /projects/{project_id}/progress:
    get:
      summary: Get AI pipeline progress
      description: Returns live progress steps from the AI pipeline. Poll every 2 seconds.
      tags: [Projects]
      operationId: getProjectProgress
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    type: object
                  progress_steps:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        stage:
                          type: string
                        message:
                          type: string
                        created_at:
                          type: string
                          format: date-time

  # ==================== REPOSITORIES ====================
  /repos/connect:
    post:
      summary: Connect a Git repository
      tags: [Repositories]
      operationId: connectRepo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepoConnectionRequest'
      responses:
        '200':
          description: Repository connected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoConnection'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /repos/{repo_id}:
    get:
      summary: Get repository details
      tags: [Repositories]
      operationId: getRepo
      parameters:
        - name: repo_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Repository details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepoConnection'
        '404':
          description: Repository not found

  # ==================== DEPLOYMENTS ====================
  /deployments:
    get:
      summary: List all deployments
      tags: [Deployments]
      operationId: listDeployments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, succeeded, failed, cancelled]
        - name: repo_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'

    post:
      summary: Create deployment
      tags: [Deployments]
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentRequest'
      responses:
        '201':
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deployments/{deployment_id}:
    get:
      summary: Get deployment status
      tags: [Deployments]
      operationId: getDeployment
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentStatus'
        '404':
          description: Deployment not found

  /deployments/{deployment_id}/run:
    post:
      summary: Execute deployment
      tags: [Deployments]
      operationId: runDeployment
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Deployment execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentExecutionResponse'
        '400':
          description: Deployment not in runnable state

  /deployments/{deployment_id}/logs:
    get:
      summary: Get deployment logs
      tags: [Deployments]
      operationId: getDeploymentLogs
      parameters:
        - name: deployment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tail
          in: query
          schema:
            type: integer
            default: 100
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Deployment logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentLogs'

  # ==================== SANDBOXES ====================
  /sandboxes:
    get:
      summary: List all sandboxes
      tags: [Sandboxes]
      operationId: listSandboxes
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [creating, running, stopped, error, destroyed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of sandboxes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxList'

    post:
      summary: Create sandbox
      tags: [Sandboxes]
      operationId: createSandbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxCreateRequest'
      responses:
        '201':
          description: Sandbox created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'

  /sandboxes/{sandbox_id}:
    get:
      summary: Get sandbox details
      tags: [Sandboxes]
      operationId: getSandbox
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sandbox details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'

  /sandboxes/{sandbox_id}/start:
    post:
      summary: Start sandbox
      tags: [Sandboxes]
      operationId: startSandbox
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sandbox started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string

  /sandboxes/{sandbox_id}/stop:
    post:
      summary: Stop sandbox
      tags: [Sandboxes]
      operationId: stopSandbox
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sandbox stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string

  /sandboxes/{sandbox_id}/execute:
    post:
      summary: Execute command in sandbox
      tags: [Sandboxes]
      operationId: executeCommand
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecuteRequest'
      responses:
        '200':
          description: Command executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecuteResponse'

  /sandboxes/{sandbox_id}/logs:
    get:
      summary: Get sandbox logs
      tags: [Sandboxes]
      operationId: getSandboxLogs
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tail
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Sandbox logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxLogs'

  # ==================== HEALTH ====================
  /health:
    get:
      summary: Health check
      tags: [System]
      operationId: healthCheck
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==================== BILLING ====================
  /billing/plans:
    get:
      summary: Get available subscription plans
      tags: [Billing]
      operationId: getPlans
      responses:
        '200':
          description: List of available plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlansResponse'

  /billing/checkout:
    post:
      summary: Create Polar checkout session
      tags: [Billing]
      operationId: createCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /billing/subscription/{user_id}:
    get:
      summary: Get user subscription status
      tags: [Billing]
      operationId: getSubscription
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /billing/cancel-subscription:
    post:
      summary: Cancel user subscription
      tags: [Billing]
      operationId: cancelSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSubscriptionRequest'
      responses:
        '200':
          description: Subscription cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '400':
          description: Invalid request

  /billing/portal-session:
    post:
      summary: Create billing portal session
      tags: [Billing]
      operationId: createPortalSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalSessionRequest'
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalSessionResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    GitHubRepository:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        full_name:
          type: string
        description:
          type: [string, 'null']
        private:
          type: boolean
        url:
          type: string
          format: uri
        clone_url:
          type: string
        default_branch:
          type: string
        language:
          type: [string, 'null']
        updated_at:
          type: string
          format: date-time

    RepoConnectionRequest:
      type: object
      required: [repo_url, provider]
      properties:
        repo_url:
          type: string
          format: uri
        provider:
          type: string
          enum: [github, gitlab]
        branch:
          type: string
          default: main
        name:
          type: string

    RepoConnection:
      type: object
      required: [id, repo_url, provider, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        repo_url:
          type: string
          format: uri
        provider:
          type: string
          enum: [github, gitlab]
        branch:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, connected, analyzing, error]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DetectedService:
      type: object
      required: [name, framework, path]
      properties:
        name:
          type: string
        framework:
          type: string
          enum: [nextjs, react, vue, angular, svelte, nuxtjs, remix, fastapi, flask, django, express, nestjs, go, rust, unknown]
        path:
          type: string
        language:
          type: string
          enum: [javascript, typescript, python, go, rust, java, ruby, php, unknown]
        recommended_platform:
          type: string
          enum: [vercel, render, docker]
        detected_files:
          type: array
          items:
            type: string
        build_command:
          type: string
        start_command:
          type: string
        env_variables:
          type: array
          items:
            type: string

    RepoAnalysis:
      type: object
      required: [repo_id, services, is_monorepo, analyzed_at]
      properties:
        repo_id:
          type: string
          format: uuid
        services:
          type: array
          items:
            $ref: '#/components/schemas/DetectedService'
        is_monorepo:
          type: boolean
        detected_workspaces:
          type: array
          items:
            type: string
        root_config:
          type: object
        analyzed_at:
          type: string
          format: date-time
        sandbox_id:
          type: string
          format: uuid

    DeploymentRequest:
      type: object
      required: [user_id, repo_full_name, installation_id]
      properties:
        user_id:
          type: string
        repo_full_name:
          type: string
        installation_id:
          type: integer
        default_branch:
          type: string
          default: main

    DeploymentResponse:
      type: object
      required: [deployment_id, status, message]
      properties:
        deployment_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [started, analyzing, deploying, success, failed]
        message:
          type: string

    DeploymentStatus:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled, retrying]
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceDeployment'
        environment:
          type: string
        branch:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_seconds:
          type: integer
        error_message:
          type: string
        retry_count:
          type: integer
          default: 0
        created_at:
          type: string
          format: date-time

    DeploymentCreateRequest:
      type: object
      required: [repo_id, services]
      properties:
        repo_id:
          type: string
          format: uuid
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceDeploymentConfig'
        environment:
          type: string
          enum: [development, staging, production]
          default: production
        branch:
          type: string
        env_variables:
          type: object
          additionalProperties:
            type: string

    ServiceDeploymentConfig:
      type: object
      required: [name, path, platform]
      properties:
        name:
          type: string
        path:
          type: string
        platform:
          type: string
          enum: [vercel, render, docker]
        build_command:
          type: string
        start_command:
          type: string
        output_directory:
          type: string
        env_variables:
          type: object
          additionalProperties:
            type: string
        vercel_config:
          $ref: '#/components/schemas/VercelDeploymentConfig'
        render_config:
          $ref: '#/components/schemas/RenderDeploymentConfig'

    VercelDeploymentConfig:
      type: object
      properties:
        project_name:
          type: string
        team_id:
          type: string
        framework:
          type: string

    RenderDeploymentConfig:
      type: object
      properties:
        service_name:
          type: string
        service_type:
          type: string
          enum: [web_service, static_site, background_worker, cron_job]
        plan:
          type: string
          default: starter

    DeploymentPlan:
      type: object
      required: [id, repo_id, status, services, created_at]
      properties:
        id:
          type: string
          format: uuid
        repo_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, planned, approved]
        services:
          type: array
          items:
            $ref: '#/components/schemas/PlannedService'
        environment:
          type: string
        branch:
          type: string
        created_at:
          type: string
          format: date-time

    PlannedService:
      type: object
      required: [name, path, platform]
      properties:
        name:
          type: string
        path:
          type: string
        platform:
          type: string
          enum: [vercel, render, docker]
        status:
          type: string
          enum: [pending, deploying, deployed, failed, skipped]
        estimated_duration_seconds:
          type: integer

    ServiceDeployment:
      type: object
      required: [name, path, platform, status]
      properties:
        name:
          type: string
        path:
          type: string
        platform:
          type: string
          enum: [vercel, render, docker]
        status:
          type: string
          enum: [pending, building, deploying, deployed, failed, skipped]
        build_logs_url:
          type: string
          format: uri
        deployment_url:
          type: string
          format: uri
        platform_deployment_id:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string

    DeploymentExecutionResponse:
      type: object
      required: [deployment_id, status, message]
      properties:
        deployment_id:
          type: string
          format: uuid
        status:
          type: string
        message:
          type: string
        estimated_duration_seconds:
          type: integer

    DeploymentLogs:
      type: object
      required: [deployment_id, logs, timestamp]
      properties:
        deployment_id:
          type: string
          format: uuid
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        timestamp:
          type: string
          format: date-time

    DeploymentList:
      type: object
      required: [deployments, total, limit, offset]
      properties:
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentStatus'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    LogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [debug, info, warning, error, fatal]
        message:
          type: string
        source:
          type: string

    SandboxCreateRequest:
      type: object
      properties:
        repo_id:
          type: string
          format: uuid
        repo_url:
          type: string
          format: uri
        branch:
          type: string
          default: main
        environment_variables:
          type: object
          additionalProperties:
            type: string
        resources:
          $ref: '#/components/schemas/SandboxResources'

    SandboxResources:
      type: object
      properties:
        cpu_cores:
          type: integer
          default: 2
        memory_mb:
          type: integer
          default: 4096
        disk_gb:
          type: integer
          default: 20

    Sandbox:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [creating, running, stopped, error, destroyed]
        repo_id:
          type: string
          format: uuid
        repo_url:
          type: string
          format: uri
        branch:
          type: string
        workspace_url:
          type: string
        resources:
          $ref: '#/components/schemas/SandboxResources'
        environment_variables:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        stopped_at:
          type: string
          format: date-time
        destroyed_at:
          type: string
          format: date-time

    SandboxList:
      type: object
      required: [sandboxes, total]
      properties:
        sandboxes:
          type: array
          items:
            $ref: '#/components/schemas/Sandbox'
        total:
          type: integer

    CommandExecuteRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
        working_directory:
          type: string
          default: /workspace
        timeout_seconds:
          type: integer
          default: 300
        env_variables:
          type: object
          additionalProperties:
            type: string

    CommandExecuteResponse:
      type: object
      required: [exit_code, stdout, stderr, duration_ms]
      properties:
        exit_code:
          type: integer
        stdout:
          type: string
        stderr:
          type: string
        duration_ms:
          type: integer
        executed_at:
          type: string
          format: date-time

    SandboxLogs:
      type: object
      required: [sandbox_id, logs]
      properties:
        sandbox_id:
          type: string
          format: uuid
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
        request_id:
          type: string

    HealthResponse:
      type: object
      required: [status, timestamp, version]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, degraded]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        services:
          type: object
          additionalProperties:
            type: string
            enum: [healthy, unhealthy]

    PlansResponse:
      type: object
      required: [plans]
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/Plan'

    Plan:
      type: object
      required: [id, name, price, features]
      properties:
        id:
          type: string
          enum: [free, pro, team]
        name:
          type: string
        price:
          type: integer
        price_id:
          type: [string, 'null']
        features:
          type: array
          items:
            type: string
        deployments_limit:
          type: integer
        projects_limit:
          type: integer
        priority:
          type: string
          enum: [normal, high, priority]

    CheckoutRequest:
      type: object
      required: [plan_id, user_id, success_url, cancel_url]
      properties:
        plan_id:
          type: string
          enum: [pro, team]
        user_id:
          type: string
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri

    CheckoutResponse:
      type: object
      required: [checkout_url, session_id]
      properties:
        checkout_url:
          type: string
          format: uri
        session_id:
          type: string

    Subscription:
      type: object
      required: [user_id, plan, status]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        plan:
          type: string
          enum: [free, pro, team]
        status:
          type: string
          enum: [active, canceled, past_due, unpaid]
        polar_customer_id:
          type: [string, 'null']
        polar_subscription_id:
          type: [string, 'null']
        current_period_start:
          type: [string, 'null']
          format: date-time
        current_period_end:
          type: [string, 'null']
          format: date-time
        cancel_at_period_end:
          type: boolean
        usage:
          type: object
          properties:
            deployments:
              type: integer
            sandboxes:
              type: integer
            bandwidth:
              type: integer

    CancelSubscriptionRequest:
      type: object
      required: [subscription_id]
      properties:
        subscription_id:
          type: string

    PortalSessionRequest:
      type: object
      required: [customer_id, return_url]
      properties:
        customer_id:
          type: string
        return_url:
          type: string
          format: uri

    PortalSessionResponse:
      type: object
      required: [portal_url]
      properties:
        portal_url:
          type: string
          format: uri